<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Red Bull Racing: two stylised bull silhouettes facing each other -->
  <rect width="64" height="64" rx="8" fill="#3671C6"/>
  <!-- Left bull (facing right) -->
  <ellipse cx="22" cy="34" rx="10" ry="7" fill="white"/>
  <circle cx="20" cy="27" r="5" fill="white"/>
  <!-- Left bull horn -->
  <path d="M17 24 Q13 18 16 15 Q18 14 20 17" stroke="white" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Left bull legs -->
  <path d="M16 40 L15 48 M20 41 L20 49 M24 41 L25 49 M28 40 L29 48" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Right bull (facing left, mirrored) -->
  <ellipse cx="42" cy="34" rx="10" ry="7" fill="#CC1C1C"/>
  <circle cx="44" cy="27" r="5" fill="#CC1C1C"/>
  <!-- Right bull horn -->
  <path d="M47 24 Q51 18 48 15 Q46 14 44 17" stroke="#CC1C1C" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Right bull legs -->
  <path d="M36 40 L35 48 M40 41 L40 49 M44 41 L44 49 M48 40 L49 48" stroke="#CC1C1C" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Sun divider -->
  <circle cx="32" cy="30" r="5" fill="#FFD700"/>
  <path d="M32 21 L32 25 M32 35 L32 39 M23 30 L27 30 M37 30 L41 30 M25.6 23.6 L28.5 26.5 M35.5 26.5 L38.4 23.6 M25.6 36.4 L28.5 33.5 M35.5 33.5 L38.4 36.4" stroke="#FFD700" stroke-width="1.5" stroke-linecap="round"/>
</svg>
