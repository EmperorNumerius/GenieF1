<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Mercedes: three-pointed star in teal -->
  <rect width="64" height="64" rx="8" fill="#27F4D2"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="22" fill="none" stroke="#0a1a18" stroke-width="3"/>
  <!-- Three-pointed star -->
  <path d="M32 10 L32 32 M32 32 L10.1 43 M32 32 L53.9 43" stroke="#0a1a18" stroke-width="4" stroke-linecap="round"/>
  <!-- Centre dot -->
  <circle cx="32" cy="32" r="3.5" fill="#0a1a18"/>
  <!-- Star point top -->
  <polygon points="32,10 29,16 35,16" fill="#0a1a18"/>
  <!-- Star point bottom-left -->
  <polygon points="10.1,43 14.5,38.8 11.8,45.8" fill="#0a1a18"/>
  <!-- Star point bottom-right -->
  <polygon points="53.9,43 52.2,45.8 49.5,38.8" fill="#0a1a18"/>
</svg>
