  <rect width="64" height="64" rx="8" fill="#2a2a2a"/>
  <!-- Bold H -->
  <line x1="14" y1="14" x2="14" y2="50" stroke="#B6BABD" stroke-width="7" stroke-linecap="round"/>
  <line x1="50" y1="14" x2="50" y2="50" stroke="#B6BABD" stroke-width="7" stroke-linecap="round"/>
  <line x1="14" y1="32" x2="50" y2="32" stroke="#B6BABD" stroke-width="7" stroke-linecap="round"/>
  <!-- Red accent bar at bottom -->
