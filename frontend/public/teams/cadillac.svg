<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Cadillac F1: laurel wreath crown / crest motif in gold on dark blue -->
  <rect width="64" height="64" rx="8" fill="#0B1F4A"/>
  <!-- Crown / crest top -->
  <path d="M20 36 L20 24 M32 36 L32 20 M44 36 L44 24" stroke="#C9A84C" stroke-width="3" stroke-linecap="round"/>
  <circle cx="20" cy="22" r="3" fill="#C9A84C"/>
  <circle cx="32" cy="17" r="3.5" fill="#C9A84C"/>
  <circle cx="44" cy="22" r="3" fill="#C9A84C"/>
  <!-- Shield outline -->
  <path d="M14 36 L14 46 Q14 52 32 56 Q50 52 50 46 L50 36 Z" fill="none" stroke="#C9A84C" stroke-width="2.5"/>
  <!-- Cross in shield -->
  <line x1="32" y1="38" x2="32" y2="52" stroke="#C9A84C" stroke-width="2"/>
  <line x1="20" y1="44" x2="44" y2="44" stroke="#C9A84C" stroke-width="2"/>
</svg>
